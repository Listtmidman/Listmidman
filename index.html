<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeastPanel - Debug Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: monospace; }
        .terminal-box { background: rgba(0,0,0,0.8); border: 1px solid #444; padding: 15px; border-radius: 10px; }
        .log-area { background: #000; color: #00ff00; font-size: 10px; padding: 10px; border: 1px solid #222; margin-top: 10px; height: 100px; overflow-y: auto; }
    </style>
</head>
<body class="p-5 flex flex-col items-center">

    <div class="w-full max-w-md space-y-4">
        <div class="terminal-box">
            <h2 class="text-center text-purple-400 font-bold mb-4">INJECTION TERMINAL</h2>
            <input id="target-uid" type="text" placeholder="TARGET UID" class="w-full p-3 bg-gray-900 border border-gray-700 mb-3 rounded">
            
            <select id="pkg" class="w-full p-3 bg-gray-900 border border-gray-700 mb-4 rounded text-sm">
                <option value="7">1,000 LIKES - $7.00</option>
                <option value="12">3,000 LIKES - $12.00</option>
                <option value="27">5,000 LIKES - $27.00</option>
            </select>

            <button onclick="runInjection()" id="btn" class="w-full bg-purple-600 p-3 rounded font-bold hover:bg-purple-500 transition">EXECUTE ORDER</button>
            
            <div class="mt-4">
                <p class="text-[10px] text-gray-400 uppercase">System Logs:</p>
                <div id="logs" class="log-area">
                    > Terminal Initialized...<br>
                    > Waiting for Command...
                </div>
            </div>
        </div>
        
        <p class="text-center text-[9px] text-gray-500">Current Balance: $<span id="bal-disp">14467.00</span></p>
    </div>

    <script>
        const SUPABASE_URL = "https://ugszmvmawidtoqjidmor.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnc3ptdm1hd2lkdG9xamlkbW9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMjkyMTYsImV4cCI6MjA5MzgwNTIxNn0.2rRQ7DbKcN4Hp_zx-Jjj4XLLfDjYu2yy2U9ecLP_oJI";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function addLog(msg, color = "#00ff00") {
            const l = document.getElementById('logs');
            l.innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
            l.scrollTop = l.scrollHeight;
        }

        async function runInjection() {
            const uid = document.getElementById('target-uid').value;
            const price = parseFloat(document.getElementById('pkg').value);
            const btn = document.getElementById('btn');
            
            if(!uid) return alert("UID Diperlukan!");

            btn.disabled = true;
            addLog("Checking Secure Uplink...", "#a78bfa");

            try {
                // 1. Semak Database
                const { data: user } = await _supabase.from('database panel').select('balance').eq('username', 'ipanzz').single();
                
                if(user.balance < price) {
                    addLog("CRITICAL ERROR: INSUFFICIENT BALANCE", "#ff4444");
                    return;
                }

                // 2. Kirim ke API Samiul
                addLog(`Injecting UID: ${uid}...`);
                const target = `https://api.ffbd.store/xM/L?key=T526C4&uid=${uid}`;
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}&timestamp=${Date.now()}`;

                const res = await fetch(proxy);
                const data = await res.json();
                
                // 3. Tunjuk "Response API" (Ini yang Samiul nak tengok)
                addLog(`API RESPONSE: ${data.contents}`, "#3b82f6");

                const apiJson = JSON.parse(data.contents);

                if(apiJson.status == 1 || apiJson.LikesGivenByAPI > 0) {
                    // Berjaya Update
                    const newBal = user.balance - price;
                    await _supabase.from('database panel').update({ balance: newBal }).eq('username', 'ipanzz');
                    document.getElementById('bal-disp').innerText = newBal.toFixed(2);
                    addLog("SUCCESS: DATA INJECTED", "#22c55e");
                } else {
                    addLog(`REJECTED: ${apiJson.message || 'Unknown Error'}`, "#fbbf24");
                }

            } catch (e) {
                addLog(`CONNECTION FAILED: ${e.message}`, "#ff4444");
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
