<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeastPanel - SMM System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg:#0e0b18; --card:#13101f; --border:#2d2944; --fg:#f0eeff; }
        body { background: var(--bg); color: var(--fg); font-family: sans-serif; min-height: 100vh; }
        .hidden { display: none; }
        .active-tab { border-bottom: 2px solid #a78bfa; color: #a78bfa; font-weight: bold; }
        input, select { background: #000 !important; border: 1px solid #2d2944 !important; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <div id="auth-section" class="w-full max-w-md bg-gray-900 mt-10 p-8 rounded-3xl border border-purple-500/30 shadow-2xl">
        <h2 class="text-3xl font-extrabold text-center mb-6 text-purple-400 italic">BEAST PANEL</h2>
        <div class="flex mb-6 border-b border-gray-800">
            <button id="login-tab" onclick="switchAuth('login')" class="flex-1 pb-3 active-tab">LOG MASUK</button>
            <button id="register-tab" onclick="switchAuth('register')" class="flex-1 pb-3 text-gray-500">DAFTAR</button>
        </div>
        <div class="space-y-4">
            <input id="auth-user" type="text" placeholder="Username" class="w-full p-4 rounded-xl text-white outline-none focus:border-purple-500">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full p-4 rounded-xl text-white outline-none focus:border-purple-500">
            <button id="auth-btn" onclick="handleAuth()" class="w-full bg-purple-600 hover:bg-purple-700 p-4 rounded-xl font-bold text-lg shadow-lg shadow-purple-500/20">LOG MASUK</button>
        </div>
    </div>

    <div id="main-dashboard" class="w-full max-w-md hidden">
        <div class="bg-gray-900 p-6 rounded-3xl border border-purple-500/30 mb-4 flex justify-between items-center">
            <div>
                <p class="text-gray-500 text-xs uppercase">PENGGUNA</p>
                <h3 id="display-name" class="text-xl font-bold text-white">---</h3>
            </div>
            <div class="text-right">
                <p class="text-gray-500 text-xs uppercase">BAKI ANDA</p>
                <p class="text-green-400 text-3xl font-black">$<span id="balance-amt">0.00</span></p>
            </div>
        </div>

        <div class="bg-gray-900 p-6 rounded-3xl border border-purple-500/30 space-y-5">
            <h4 class="font-bold text-purple-300 uppercase text-sm text-center">Pesan Likes Automatik</h4>
            <div>
                <label class="text-xs text-gray-500 ml-1">PLAYER ID (UID)</label>
                <input id="target-uid" type="text" placeholder="Masukkan UID" class="w-full p-4 rounded-xl text-white mt-1">
            </div>
            <div>
                <label class="text-xs text-gray-500 ml-1">PILIH PAKEJ</label>
                <select id="package-select" class="w-full p-4 rounded-xl text-white mt-1"></select>
            </div>
            <button id="order-btn" onclick="orderProcess()" class="w-full bg-purple-600 hover:bg-purple-700 p-4 rounded-2xl font-black text-lg shadow-lg shadow-purple-500/20 transition-all">PESAN SEKARANG</button>
            <p id="status-msg" class="text-center text-sm font-medium mt-2 min-h-[24px]"></p>
        </div>

        <div class="grid grid-cols-2 gap-3 mt-4">
            <button onclick="window.open('https://wa.me/601165406482?text=Nak+Topup')" class="bg-green-600 hover:bg-green-700 p-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                <span>➕ TOPUP</span>
            </button>
            <button onclick="location.reload()" class="bg-gray-800 hover:bg-gray-700 p-4 rounded-2xl font-bold text-gray-300">LOGOUT</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ugszmvmawidtoqjidmor.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnc3ptdm1hd2lkdG9xamlkbW9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMjkyMTYsImV4cCI6MjA5MzgwNTIxNn0.2rRQ7DbKcN4Hp_zx-Jjj4XLLfDjYu2yy2U9ecLP_oJI"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const TABLE_NAME = 'database panel';

        let currentUser = null;
        let mode = 'login';

        const packages = [
            { name: "1,000 Likes", price: 7.00 },
            { name: "3,000 Likes", price: 12.00 },
            { name: "5,000 Likes", price: 27.00 },
            { name: "6,000 Likes", price: 35.00 },
            { name: "10,000 Likes", price: 45.00 }
        ];

        const pkgSelect = document.getElementById('package-select');
        packages.forEach((pkg, i) => {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = `${pkg.name} - $${pkg.price.toFixed(2)}`;
            pkgSelect.appendChild(opt);
        });

        function switchAuth(m) {
            mode = m;
            document.getElementById('login-tab').className = m === 'login' ? 'flex-1 pb-3 active-tab' : 'flex-1 pb-3 text-gray-500';
            document.getElementById('register-tab').className = m === 'register' ? 'flex-1 pb-3 active-tab' : 'flex-1 pb-3 text-gray-500';
            document.getElementById('auth-btn').innerText = m === 'login' ? 'LOG MASUK' : 'DAFTAR AKAUN';
        }

        async function handleAuth() {
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            const btn = document.getElementById('auth-btn');

            if(!u || !p) return alert("Isi Username/Password!");
            btn.disabled = true;
            btn.innerText = "Sila Tunggu...";

            try {
                if(mode === 'register') {
                    const { error } = await _supabase.from(TABLE_NAME).insert([{username: u, password: p, balance: 0}]);
                    if(error) throw new Error("Gagal Daftar!");
                    alert("Berjaya! Sila log masuk.");
                    switchAuth('login');
                } else {
                    const { data, error } = await _supabase.from(TABLE_NAME).select('*').eq('username', u).eq('password', p).maybeSingle();
                    if(error || !data) throw new Error("Akaun tidak ditemui!");
                    currentUser = data;
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('main-dashboard').classList.remove('hidden');
                    document.getElementById('display-name').innerText = currentUser.username.toUpperCase();
                    document.getElementById('balance-amt').innerText = Number(currentUser.balance).toFixed(2);
                }
            } catch (err) { alert(err.message); }
            finally { btn.disabled = false; btn.innerText = mode === 'login' ? 'LOG MASUK' : 'DAFTAR AKAUN'; }
        }

        async function orderProcess() {
            const uid = document.getElementById('target-uid').value.trim();
            const pkg = packages[document.getElementById('package-select').value];
            const status = document.getElementById('status-msg');
            const btn = document.getElementById('order-btn');

            if(!uid) return alert("Masukkan UID!");
            btn.disabled = true;
            btn.classList.add('loading');
            status.innerText = "⏳ Memproses...";
            status.style.color = "#a78bfa";

            try {
                const { data: user } = await _supabase.from(TABLE_NAME).select('balance').eq('username', currentUser.username).single();
                if(user.balance < pkg.price) {
                    status.innerText = "❌ Baki Tidak Cukup!";
                    status.style.color = "#ef4444";
                    return;
                }

                // MULTI-PROXY AUTO-SWITCH
                const proxies = [
                    `https://api.allorigins.win/get?url=`,
                    `https://corsproxy.io/?`,
                    `https://thingproxy.freeboard.io/fetch/`
                ];

                let apiResponse = null;
                const targetUrl = `https://api.ffbd.store/xM/L?key=T526C4&uid=${uid}`;

                for (let proxy of proxies) {
                    try {
                        const res = await fetch(proxy + encodeURIComponent(targetUrl));
                        const raw = await res.json();
                        apiResponse = typeof raw.contents === 'string' ? JSON.parse(raw.contents) : (raw.contents || raw);
                        if (apiResponse) break;
                    } catch (e) { console.warn("Proxy gagal, mencuba proxy lain..."); }
                }

                if (!apiResponse) throw new Error("Semua proxy gagal disambung.");

                // SEMAK STATUS API PEMBEKAL
                if (apiResponse.status === 1 || apiResponse.LikesGivenByAPI > 0) {
                    const newBal = user.balance - pkg.price;
                    await _supabase.from(TABLE_NAME).update({balance: newBal}).eq('username', currentUser.username);
                    document.getElementById('balance-amt').innerText = newBal.toFixed(2);
                    status.innerText = `✅ BERJAYA! ${apiResponse.LikesGivenByAPI} Likes dihantar.`;
                    status.style.color = "#22c55e";
                } else if (apiResponse.status === 2 || apiResponse.status === 3) {
                    status.innerText = "❌ HAD HARIAN DICAPAI: Sila cuba esok atau guna UID lain.";
                    status.style.color = "#facc15";
                } else {
                    status.innerText = "❌ RALAT API: Pembekal Sedang Maintenance.";
                    status.style.color = "#ef4444";
                }
            } catch (e) {
                status.innerText = "❌ Sambungan Tidak Stabil. Cuba lagi sebentar.";
                status.style.color = "#ef4444";
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
