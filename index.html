<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <title>BeastPanel - Cloud Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Courier New', monospace; }
        .glass { background: rgba(19, 16, 31, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(167, 139, 250, 0.2); border-radius: 24px; }
        .neon-border { box-shadow: 0 0 15px rgba(167, 139, 250, 0.3); }
        .input-field { background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; outline: none; width: 100%; transition: 0.3s; }
        .input-field:focus { border-color: #a78bfa; box-shadow: 0 0 10px rgba(167, 139, 250, 0.2); }
        .btn-primary { background: #a78bfa; color: black; font-weight: bold; padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; border: none; display: block; text-align: center; transition: 0.2s; }
        .btn-primary:hover:not(:disabled) { background: #c4b5fd; transform: scale(1.02); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        .hidden { display: none !important; }
        .rank-badge { font-size: 9px; padding: 2px 8px; border-radius: 99px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; display: inline-block; }
        .notif-box { background: rgba(167, 139, 250, 0.1); border-left: 4px solid #a78bfa; padding: 12px; border-radius: 8px; margin-bottom: 15px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0px rgba(167, 139, 250, 0.2); } 50% { box-shadow: 0 0 10px rgba(167, 139, 250, 0.4); } 100% { box-shadow: 0 0 0px rgba(167, 139, 250, 0.2); } }
        .modal-custom { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; font-size: 10px; font-weight: bold; color: #666; border-bottom: 2px solid transparent; cursor: pointer; }
        .tab-btn.active { color: #a78bfa; border-bottom: 2px solid #a78bfa; }
        .player-card { background: rgba(0,0,0,0.6); border: 1px solid rgba(167,139,250,0.3); border-radius: 16px; padding: 14px; margin-top: 8px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .player-row:last-child { border-bottom: none; }
        .check-btn { background: rgba(59,130,246,0.2); color: #60a5fa; font-weight: bold; padding: 8px 14px; border-radius: 10px; cursor: pointer; border: 1px solid rgba(59,130,246,0.4); font-size: 10px; letter-spacing: 1px; transition: 0.2s; white-space: nowrap; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="auth-container" class="w-full max-w-md glass p-8 neon-border">
        <h2 class="text-2xl font-black text-center mb-6 tracking-widest text-purple-400">SYSTEM ACCESS</h2>
        <div class="flex flex-col space-y-4">
            <input id="auth-user" type="text" placeholder="USERNAME" class="input-field">
            <input id="auth-pass" type="password" placeholder="PASSWORD" class="input-field">
            <button id="login-btn" onclick="handleAuth('login')" class="btn-primary">LOGIN</button>
            <button onclick="handleAuth('register')" class="text-[10px] text-gray-500 hover:text-purple-400 uppercase tracking-widest mt-2">Register New Uplink</button>
        </div>
        <p id="auth-msg" class="text-[10px] mt-4 text-center text-gray-500 font-mono"></p>
    </div>

    <div id="main-dashboard" class="w-full max-w-md space-y-4 hidden">
        <div class="notif-box">
            <p class="text-[10px] text-purple-300 font-bold uppercase tracking-widest">System Broadcast:</p>
            <p class="text-[11px] text-white mt-1">🚀 Sila hubungi Reseller di tab TOPUP jika ada masalah kredit.</p>
        </div>

        <div class="glass p-6 flex justify-between items-center neon-border">
            <div>
                <span id="user-rank" class="rank-badge bg-purple-900/50 text-purple-300">...</span>
                <p class="text-[10px] text-purple-400 font-bold uppercase">Subject ID</p>
                <h3 id="display-name" class="text-xl font-black text-white">---</h3>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-green-400 font-bold uppercase">Available Credits</p>
                <p class="text-2xl font-black text-green-400 tracking-tighter">$<span id="balance-amt">0.00</span></p>
            </div>
        </div>

        <div class="flex border-b border-gray-800">
            <div id="tab-terminal" class="tab-btn active" onclick="switchTab('terminal')">TERMINAL</div>
            <div id="tab-topup" class="tab-btn" onclick="switchTab('topup')">TOPUP</div>
            <div id="tab-transfer" class="tab-btn hidden" onclick="switchTab('transfer')">TRANSFER</div>
        </div>

        <div id="page-terminal" class="glass p-6 space-y-4">
            <h4 class="text-center text-xs tracking-widest text-purple-300 uppercase italic">Injection Terminal</h4>
            <div class="flex gap-2">
                <input id="target-uid" type="number" placeholder="TARGET UID" class="input-field">
                <button id="check-btn" onclick="checkId()" class="check-btn">CHECK ID</button>
            </div>
            <div id="player-info" class="hidden player-card">
                <div class="player-row"><span class="text-[10px] text-gray-400">Nickname</span><span id="pi-nickname" class="text-[10px] text-white font-bold">-</span></div>
                <div class="player-row"><span class="text-[10px] text-gray-400">Region</span><span id="pi-region" class="text-[10px] text-blue-300 font-bold">-</span></div>
                <div class="player-row"><span class="text-[10px] text-gray-400">Level</span><span id="pi-level" class="text-[10px] text-yellow-300 font-bold">-</span></div>
                <div class="player-row"><span class="text-[10px] text-gray-400">Likes</span><span id="pi-likes" class="text-[10px] text-pink-400 font-bold">-</span></div>
            </div>
            <label class="text-[10px] text-gray-500 uppercase ml-1">Pilih Pakej Likes:</label>
            <select id="package-select" class="input-field"></select>
            <button id="order-btn" onclick="executeOrder()" class="btn-primary">EXECUTE ORDER</button>
            <p id="status-msg" class="text-center text-[10px] font-mono">&gt; STANDBY...</p>
        </div>

        <div id="page-topup" class="hidden glass p-6 space-y-4">
            <h4 class="text-center text-xs tracking-widest text-purple-300 uppercase">Recharge Balance</h4>
            <div id="reseller-list" class="space-y-2"></div>
            <hr class="border-gray-800">
            <button onclick="showQR()" class="btn-primary bg-green-500">CONFIRM TOPUP (OWNER QR)</button>
        </div>

        <div id="page-transfer" class="hidden glass p-6 space-y-4">
            <h4 class="text-center text-xs tracking-widest text-green-300 uppercase">Admin Transfer</h4>
            <input id="tf-username" type="text" placeholder="TARGET USERNAME" class="input-field uppercase">
            <input id="tf-amount" type="number" placeholder="AMOUNT ($)" class="input-field">
            <button onclick="executeTransfer()" class="btn-primary bg-green-500">KREDITKAN MEMBER</button>
        </div>

        <button onclick="location.reload()" class="w-full text-[10px] text-gray-600 p-2 uppercase tracking-widest">[-] Logout Session</button>
    </div>

    <div id="qr-modal" class="modal-custom hidden">
        <div class="bg-[#1a1a1a] p-6 rounded-3xl text-center border border-purple-500 max-w-xs w-full">
            <img src="https://i.postimg.cc/mPb09Tvn/c335e73e-e4f0-4351-92fc-4f76cb54fc9d.jpg" class="w-full rounded-xl mb-4 border-2 border-white">
            <button onclick="sendWA()" class="btn-primary bg-purple-600">HANTAR RESIT</button>
            <button onclick="document.getElementById('qr-modal').classList.add('hidden')" class="text-xs text-gray-500 mt-4 block mx-auto">TUTUP</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ugszmvmawidtoqjidmor.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnc3ptdm1hd2lkdG9xamlkbW9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMjkyMTYsImV4cCI6MjA5MzgwNTIxNn0.2rRQ7DbKcN4Hp_zx-Jjj4XLLfDjYu2yy2U9ecLP_oJI";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const API_KEY = "T526C4";
        const FF_LIKES_API = "https://api.ffbd.store/xM/L";
        const FF_NICKNAME_API = "https://api.ffbd.store/nickname"; 

        let currentUser = null;

        const PRICING = {
            MEMBER: [ { val: 0.80, label: "100 LIKES - $0.80" }, { val: 7.50, label: "1,000 LIKES - $7.50" } ],
            RESELLER: [ { val: 0.50, label: "100 LIKES - $0.50" }, { val: 4.50, label: "1,000 LIKES - $4.50" } ],
            OWNER: [ { val: 0.10, label: "100 LIKES - $0.10" }, { val: 0.80, label: "1,000 LIKES - $0.80" } ]
        };

        const RESELLERS = [
            { name: "LUQQSTORE", phone: "601127112378" },
            { name: "ZERO", phone: "60198424337" },
            { name: "MOR", phone: "601112614932" }
        ];

        function switchTab(tab) {
            ['page-terminal', 'page-topup', 'page-transfer'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById('page-' + tab).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
        }

        async function handleAuth(type) {
            const user = document.getElementById('auth-user').value.trim().toLowerCase();
            const pass = document.getElementById('auth-pass').value.trim();
            const msg = document.getElementById('auth-msg');

            if (!user || !pass) return alert("Sila isi Username & Password!");
            msg.innerText = "> MENGHUBUNGKAN...";

            try {
                if (type === 'register') {
                    const { data: exists } = await _supabase.from('database panel').select('username').eq('username', user).maybeSingle();
                    if (exists) throw new Error("Username sudah wujud!");
                    const { error } = await _supabase.from('database panel').insert([{ username: user, password: pass, balance: 0, rank: 'MEMBER' }]);
                    if (error) throw error;
                    alert("Berjaya daftar! Sila Login.");
                    msg.innerText = "";
                } else {
                    const { data, error } = await _supabase.from('database panel').select('*').eq('username', user).eq('password', pass).maybeSingle();
                    if (error) throw error;
                    if (!data) throw new Error("Username atau Password salah!");
                    
                    currentUser = data;
                    initDashboard();
                }
            } catch (e) { 
                alert(e.message); 
                msg.innerText = "> RALAT AKSES";
                console.error(e);
            }
        }

        function initDashboard() {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            
            // Set Data
            document.getElementById('display-name').innerText = currentUser.username.toUpperCase();
            document.getElementById('balance-amt').innerText = parseFloat(currentUser.balance).toFixed(2);
            document.getElementById('user-rank').innerText = (currentUser.rank || 'MEMBER').toUpperCase();
            
            const rank = (currentUser.rank || 'MEMBER').toUpperCase();
            const plans = PRICING[rank] || PRICING.MEMBER;
            document.getElementById('package-select').innerHTML = plans.map(p => `<option value="${p.val}">${p.label}</option>`).join('');
            
            if (rank === 'OWNER' || rank === 'RESELLER') {
                document.getElementById('tab-transfer').classList.remove('hidden');
            }
            
            document.getElementById('reseller-list').innerHTML = RESELLERS.map(r => `
                <div class="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-purple-500/20">
                    <span class="text-[11px] font-bold text-white">${r.name} RESELLER</span>
                    <a href="https://wa.me/${r.phone}" target="_blank" class="text-[9px] bg-green-600 text-white px-3 py-1.5 rounded-lg font-bold">WHATSAPP</a>
                </div>
            `).join('');
        }

        async function checkId() {
            const uid = document.getElementById('target-uid').value.trim();
            const btn = document.getElementById('check-btn');
            if (!uid) return;
            btn.innerText = "...";
            btn.disabled = true;

            try {
                const res = await fetch(`${FF_NICKNAME_API}?uid=${uid}`, { mode: 'cors' });
                const data = await res.json();
                const info = Array.isArray(data) ? data[0] : data;
                const extra = Array.isArray(data) && data[1] ? data[1] : info;

                if (!info || !info.nickname) throw new Error("Tak dijumpai");

                document.getElementById('pi-nickname').innerText = info.nickname;
                document.getElementById('pi-region').innerText = info.region || "N/A";
                document.getElementById('pi-level').innerText = extra.level || "N/A";
                document.getElementById('pi-likes').innerText = extra.likes || "N/A";
                document.getElementById('player-info').classList.remove('hidden');
            } catch (e) {
                alert("ID Tak Sah atau API Error");
            } finally {
                btn.innerText = "CHECK ID";
                btn.disabled = false;
            }
        }

        async function executeOrder() {
            const uid = document.getElementById('target-uid').value.trim();
            const price = parseFloat(document.getElementById('package-select').value);
            const status = document.getElementById('status-msg');
            if (!uid) return alert("Masukkan UID!");

            try {
                const { data: user, error } = await _supabase.from('database panel').select('balance').eq('username', currentUser.username).single();
                if (user.balance < price) throw new Error("Kredit kurang!");

                status.innerText = "> INJECTING...";
                const res = await fetch(`${FF_LIKES_API}?key=${API_KEY}&uid=${uid}`);
                const result = await res.json();

                if (result.status !== "success" && result.status !== 1) throw new Error("API Offline");

                const newBal = user.balance - price;
                await _supabase.from('database panel').update({ balance: newBal }).eq('username', currentUser.username);
                document.getElementById('balance-amt').innerText = newBal.toFixed(2);
                status.innerText = "> BERJAYA!";
            } catch (e) { status.innerText = "> GAGAL: " + e.message; }
        }

        async function executeTransfer() {
            const target = document.getElementById('tf-username').value.trim().toLowerCase();
            const amt = parseFloat(document.getElementById('tf-amount').value);
            if (!target || isNaN(amt)) return alert("Isi Username & Amaun!");
            try {
                const { data: rec } = await _supabase.from('database panel').select('balance').eq('username', target).single();
                if (!rec) throw new Error("User tidak wujud!");
                await _supabase.from('database panel').update({ balance: rec.balance + amt }).eq('username', target);
                alert(`Berjaya pindah $${amt} ke ${target}`);
            } catch (e) { alert("Gagal: " + e.message); }
        }

        function showQR() {
            document.getElementById('qr-modal').classList.remove('hidden');
        }

        function sendWA() { 
            window.open(`https://wa.me/601165406482?text=SAYA%20DAH%20TOPUP%20USER%20${currentUser.username.toUpperCase()}`, '_blank'); 
        }
    </script>
</body>
</html>
