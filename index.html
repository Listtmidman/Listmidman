<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeastPanel - Cloud Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Courier New', monospace; }
        .glass { background: rgba(19, 16, 31, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(167, 139, 250, 0.2); border-radius: 24px; }
        .neon-border { box-shadow: 0 0 15px rgba(167, 139, 250, 0.3); }
        .input-field { background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; outline: none; width: 100%; }
        .btn-primary { background: #a78bfa; color: black; font-weight: bold; padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; border: none; }
        .btn-primary:disabled { opacity: 0.5; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="auth-container" class="w-full max-w-md glass p-8 neon-border">
        <h2 class="text-2xl font-black text-center mb-6 text-purple-400">SYSTEM ACCESS</h2>
        <div class="space-y-4">
            <input id="auth-user" type="text" placeholder="USERNAME" class="input-field">
            <input id="auth-pass" type="password" placeholder="PASSWORD" class="input-field">
            <button onclick="handleAuth('login')" class="btn-primary">LOGIN</button>
            <button onclick="handleAuth('register')" class="text-[10px] text-gray-500 w-full mt-2">REGISTER NEW UPLINK</button>
        </div>
        <p id="auth-msg" class="text-[10px] mt-4 text-center"></p>
    </div>

    <div id="main-dashboard" class="w-full max-w-md space-y-4 hidden">
        <div class="glass p-6 flex justify-between items-center neon-border">
            <div>
                <p class="text-[10px] text-purple-400 font-bold uppercase">Subject ID</p>
                <h3 id="display-name" class="text-xl font-black text-white">---</h3>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-green-400 font-bold uppercase">Balance</p>
                <p class="text-2xl font-black text-green-400 tracking-tighter">$<span id="balance-amt">0.00</span></p>
            </div>
        </div>

        <div class="glass p-6 space-y-4">
            <input id="target-uid" type="number" placeholder="TARGET UID" class="input-field">
            <select id="package-select" class="input-field">
                <option value="7">1,000 LIKES - $7.00</option>
                <option value="12">3,000 LIKES - $12.00</option>
            </select>
            <button id="order-btn" onclick="executeOrder()" class="btn-primary">EXECUTE ORDER</button>
            <div class="bg-black border border-gray-800 p-3 rounded-lg min-h-[80px]">
                <p id="status-msg" class="text-blue-400 text-[10px] font-mono">> STANDBY...</p>
                <p id="api-debug" class="text-gray-600 text-[8px] mt-2 break-all font-mono"></p>
            </div>
            <button onclick="location.reload()" class="w-full text-[10px] text-gray-600 p-2">[-] DISCONNECT</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ugszmvmawidtoqjidmor.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnc3ptdm1hd2lkdG9xamlkbW9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMjkyMTYsImV4cCI6MjA5MzgwNTIxNn0.2rRQ7DbKcN4Hp_zx-Jjj4XLLfDjYu2yy2U9ecLP_oJI";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = null;

        async function handleAuth(type) {
            const user = document.getElementById('auth-user').value.trim().toLowerCase();
            const pass = document.getElementById('auth-pass').value.trim();
            const msg = document.getElementById('auth-msg');
            if(!user || !pass) return;

            try {
                if(type === 'register') {
                    await _supabase.from('database panel').insert([{ username: user, password: pass, balance: 1000 }]);
                    msg.innerText = "REGISTERED! NOW LOGIN.";
                    msg.style.color = "green";
                } else {
                    const { data, error } = await _supabase.from('database panel').select('*').eq('username', user).eq('password', pass).maybeSingle();
                    if(!data) throw new Error("WRONG ID/PASS");
                    currentUser = data;
                    document.getElementById('auth-container').classList.add('hidden');
                    document.getElementById('main-dashboard').classList.remove('hidden');
                    document.getElementById('display-name').innerText = currentUser.username.toUpperCase();
                    document.getElementById('balance-amt').innerText = currentUser.balance.toFixed(2);
                }
            } catch (e) { msg.innerText = e.message; msg.style.color = "red"; }
        }

        async function executeOrder() {
            const uid = document.getElementById('target-uid').value;
            const price = parseFloat(document.getElementById('package-select').value);
            const status = document.getElementById('status-msg');
            const debug = document.getElementById('api-debug');
            const btn = document.getElementById('order-btn');

            if(!uid) return;
            btn.disabled = true;
            status.innerText = "> INJECTING...";

            try {
                const { data: user } = await _supabase.from('database panel').select('balance').eq('username', currentUser.username).single();
                if(user.balance < price) throw new Error("NO MONEY");

                const targetUrl = `https://api.ffbd.store/xM/L?key=T526C4&uid=${uid}`;
                
                // --- STRATEGI MULTI-PROXY (Sangat Penting) ---
                const proxies = [
                    `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`,
                    `https://thingproxy.freeboard.io/fetch/${targetUrl}`,
                    `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
                ];

                let response, rawData, success = false;

                for (let proxy of proxies) {
                    try {
                        status.innerText = `> TRYING UPLINK...`;
                        response = await fetch(proxy);
                        if (response.ok) {
                            const json = await response.json();
                            rawData = json.contents || json; // Handle AllOrigins or direct JSON
                            if (typeof rawData === 'string') rawData = JSON.parse(rawData);
                            success = true;
                            break; 
                        }
                    } catch (err) { continue; }
                }

                if (!success) throw new Error("ALL_PROXIES_FAILED");

                debug.innerText = JSON.stringify(rawData);

                if(rawData.status == "1" || rawData.message === "Success") {
                    const newBal = user.balance - price;
                    await _supabase.from('database panel').update({ balance: newBal }).eq('username', currentUser.username);
                    document.getElementById('balance-amt').innerText = newBal.toFixed(2);
                    status.innerText = "> SUCCESS!";
                    status.style.color = "#22c55e";
                } else {
                    status.innerText = `> REJECTED: ${rawData.message}`;
                }
            } catch (e) {
                status.innerText = `> ERROR: ${e.message}`;
                status.style.color = "#ef4444";
            } finally { btn.disabled = false; }
        }
    </script>
</body>
</html>
