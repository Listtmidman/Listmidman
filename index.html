<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeastPanel - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg:#0e0b18; --card:#13101f; --border:#2d2944; --fg:#f0eeff; }
        body { background: var(--bg); color: var(--fg); font-family: sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">
    <div id="auth-section" class="max-w-md mx-auto mt-20 bg-gray-900 p-8 rounded-2xl border border-purple-500/30 text-center">
        <h2 class="text-2xl font-bold mb-4 text-purple-400">BEAST PANEL</h2>
        <input id="user-input" type="text" placeholder="Username Pembeli" class="w-full p-3 bg-black border border-gray-700 rounded-lg mb-4 text-white text-center">
        <button onclick="handleLogin()" class="w-full bg-purple-600 p-3 rounded-lg font-bold">MASUK DASHBOARD</button>
    </div>

    <div id="main-dashboard" class="max-w-md mx-auto hidden bg-gray-900 p-6 rounded-2xl border border-purple-500/30">
        <div class="flex justify-between items-center mb-6">
            <div>
                <p class="text-gray-400 text-xs">HALO,</p>
                <h3 id="display-name" class="text-xl font-bold">USER</h3>
            </div>
            <div class="text-right">
                <p class="text-gray-400 text-xs text-right">BAKI ANDA</p>
                <p class="text-green-400 text-2xl font-bold text-right">$<span id="balance-amt">0.00</span></p>
            </div>
        </div>

        <div class="space-y-4">
            <label class="block text-xs text-gray-400">PLAYER ID (UID)</label>
            <input id="target-uid" type="text" placeholder="Contoh: 12345678" class="w-full p-3 bg-black border border-gray-700 rounded-lg text-white">
            
            <label class="block text-xs text-gray-400">PILIH PAKEJ LIKES</label>
            <select id="package-select" class="w-full p-3 bg-black border border-gray-700 rounded-lg text-white"></select>
            
            <button onclick="orderProcess()" class="w-full bg-purple-600 p-4 rounded-xl font-bold text-lg mt-4 shadow-lg shadow-purple-500/20">PESAN SEKARANG</button>
            <p id="status-msg" class="text-center text-sm mt-4 font-medium"></p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ugszmvmawidtoqjidmor.supabase.co";
        const SUPABASE_KEY = "GANTI_DENGAN_ANON_KEY_AWAK"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        const packages = [
            { name: "1,000 Likes", price: 7.00 },
            { name: "3,000 Likes", price: 12.00 },
            { name: "5,000 Likes", price: 27.00 },
            { name: "6,000 Likes", price: 35.00 },
            { name: "10,000 Likes", price: 45.00 }
        ];

        const pkgSelect = document.getElementById('package-select');
        packages.forEach((pkg, index) => {
            let opt = document.createElement('option');
            opt.value = index;
            opt.innerHTML = `${pkg.name} - $${pkg.price.toFixed(2)}`;
            pkgSelect.appendChild(opt);
        });

        async function handleLogin() {
            const user = document.getElementById('user-input').value.trim();
            if(!user) return alert("Sila isi username!");
            let { data: profile } = await _supabase.from('profiles').select('*').eq('username', user).single();
            if(!profile) {
                const { data: newP } = await _supabase.from('profiles').insert([{username:user, balance:0.00}]).select().single();
                profile = newP;
            }
            currentUser = profile;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('display-name').innerText = currentUser.username;
            document.getElementById('balance-amt').innerText = currentUser.balance.toFixed(2);
        }

        async function orderProcess() {
            const uid = document.getElementById('target-uid').value;
            const pkg = packages[document.getElementById('package-select').value];
            const status = document.getElementById('status-msg');
            if(!uid) return alert("Masukkan UID Player!");
            
            const { data: u } = await _supabase.from('profiles').select('balance').eq('id', currentUser.id).single();
            if(u.balance < pkg.price) {
                status.innerText = "❌ Baki tidak mencukupi!";
                status.style.color = "#ef4444";
                return;
            }

            status.innerText = "⏳ Sedang diproses...";
            status.style.color = "#a78bfa";
            
            try {
                const res = await fetch(`https://api.ffbd.store/xM/L?key=T526C4&uid=${uid}`);
                if(res.ok) {
                    const newB = u.balance - pkg.price;
                    await _supabase.from('profiles').update({balance: newB}).eq('id', currentUser.id);
                    document.getElementById('balance-amt').innerText = newB.toFixed(2);
                    status.innerText = `✅ BERJAYA! ${pkg.name} dihantar ke ${uid}`;
                    status.style.color = "#22c55e";
                } else {
                    status.innerText = "❌ Ralat API Pembekal.";
                }
            } catch (e) {
                status.innerText = "❌ Gagal menyambung ke API.";
            }
        }
    </script>
</body>
</html>
