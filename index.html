<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeastPanel - Cloud Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Courier New', monospace; }
        .glass { background: rgba(19, 16, 31, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(167, 139, 250, 0.2); border-radius: 24px; }
        .neon-border { box-shadow: 0 0 15px rgba(167, 139, 250, 0.3); }
        .input-field { background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; outline: none; width: 100%; }
        .btn-primary { background: #a78bfa; color: black; font-weight: bold; padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; border: none; }
        .btn-secondary { background: #1f2937; color: #a78bfa; padding: 8px; border-radius: 8px; font-size: 10px; border: 1px solid #374151; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="auth-container" class="w-full max-w-md glass p-8 neon-border">
        <h2 class="text-2xl font-black text-center mb-6 text-purple-400">SYSTEM ACCESS</h2>
        <div class="space-y-4">
            <input id="auth-user" type="text" placeholder="USERNAME" class="input-field">
            <input id="auth-pass" type="password" placeholder="PASSWORD" class="input-field">
            <button onclick="handleAuth('login')" class="btn-primary">LOGIN</button>
            <button onclick="handleAuth('register')" class="text-[10px] text-gray-500 w-full mt-2">REGISTER NEW UPLINK</button>
        </div>
        <p id="auth-msg" class="text-[10px] mt-4 text-center"></p>
    </div>

    <div id="main-dashboard" class="w-full max-w-md space-y-4 hidden">
        <div class="glass p-6 flex justify-between items-center neon-border">
            <div>
                <p class="text-[10px] text-purple-400 font-bold uppercase">Subject ID</p>
                <h3 id="display-name" class="text-xl font-black text-white">---</h3>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-green-400 font-bold uppercase">Balance</p>
                <p class="text-2xl font-black text-green-400 tracking-tighter">$<span id="balance-amt">0.00</span></p>
            </div>
        </div>

        <div class="glass p-6 space-y-4">
            <div class="relative">
                <input id="target-uid" type="number" placeholder="TARGET UID" class="input-field pr-20">
                <button onclick="checkNickname()" class="absolute right-2 top-2 btn-secondary">CHECK</button>
            </div>
