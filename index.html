<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeastPanel - Boost Likeff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --hacker-green: #00ff41; 
            --hacker-dark: #0a0a0a;
            --purple-glow: #a78bfa;
        }
        
        body { 
            background-color: var(--hacker-dark); 
            color: #e0e0e0; 
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.15;
        }

        .glass-card {
            background: rgba(19, 16, 31, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(167, 139, 250, 0.2);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .neon-text {
            text-shadow: 0 0 10px var(--purple-glow), 0 0 20px var(--purple-glow);
        }

        .neon-border-focus:focus {
            border-color: var(--purple-glow) !important;
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.4);
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.6);
            transform: translateY(-2px);
        }

        input, select {
            background: rgba(0, 0, 0, 0.7) !important;
            border: 1px solid #2d2944 !important;
            transition: all 0.3s ease;
        }

        .loading-pulse {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <canvas id="matrix-canvas"></canvas>

    <div id="auth-section" class="w-full max-w-md glass-card mt-12 p-8 rounded-3xl transition-all duration-500">
        <h2 class="text-4xl font-black text-center mb-2 text-purple-400 italic neon-text">BEAST PANEL</h2>
        <p class="text-center text-[10px] text-purple-300/50 tracking-[0.3em] mb-8 uppercase">Hacker Protocol Enabled</p>
        
        <div class="flex mb-8 border-b border-gray-800/50">
            <button id="login-tab" onclick="switchAuth('login')" class="flex-1 pb-3 text-sm font-bold transition-all duration-300 border-b-2 border-purple-500 neon-text">SYSTEM ACCESS</button>
            <button id="register-tab" onclick="switchAuth('register')" class="flex-1 pb-3 text-sm font-bold text-gray-600 transition-all duration-300">NEW UPLINK</button>
        </div>

        <div class="space-y-5">
            <div class="relative">
                <input id="auth-user" type="text" placeholder="Username" class="w-full p-4 rounded-xl text-white outline-none neon-border-focus pl-12">
                <span class="absolute left-4 top-4 opacity-30">👤</span>
            </div>
            <div class="relative">
                <input id="auth-pass" type="password" placeholder="Password" class="w-full p-4 rounded-xl text-white outline-none neon-border-focus pl-12">
                <span class="absolute left-4 top-4 opacity-30">🔑
