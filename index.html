<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeastPanel - Cloud Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Courier New', monospace; overflow-x: hidden; }
        .glass { background: rgba(19, 16, 31, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(167, 139, 250, 0.2); border-radius: 24px; }
        .neon-border { box-shadow: 0 0 15px rgba(167, 139, 250, 0.3); }
        .input-field { background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #a78bfa; box-shadow: 0 0 10px rgba(167, 139, 250, 0.2); }
        .btn-primary { background: #a78bfa; color: black; font-weight: bold; padding: 12px; border-radius: 12px; transition: 0.3s; }
        .btn-primary:hover { background: #c4b5fd; transform: scale(1.02); }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="auth-container" class="w-full max-w-md glass p-8 neon-border">
        <h2 id="auth-title" class="text-2xl font-black text-center mb-6 tracking-widest text-purple-400">SYSTEM ACCESS</h2>
        
        <div class="flex flex-col space-y-4">
            <input id="auth-user" type="text" placeholder="USERNAME" class="input-field">
            <input id="auth-pass" type="password" placeholder="PASSWORD" class="input-field">
            
            <button id="login-btn" onclick="handleAuth('login')" class="btn-primary">LOGIN</button>
            <button id="register-btn" onclick="handleAuth('register')" class="text-xs text-gray-500 hover:text-purple-400">NO ACCOUNT? REGISTER HERE</button>
        </div>
        <p id="auth-msg" class="text-[10px] mt-4 text-center text-red-500"></p>
    </div>

    <div id="main-dashboard" class="w-full max-w-md space-y-4 hidden">
        <div class="glass p-6 flex justify-between items-center neon-border">
            <div>
                <p class="text-[10px] text-purple-400 font-bold uppercase">Subject ID</p>
                <h3 id="display-name" class="text-xl font-black">---</h3>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-green-400 font-bold uppercase">Available Credits</p>
                <p class="text-2xl font-black text-green-400 tracking-tighter">$<span id="balance-amt">0.00</span></p>
            </div>
        </div>

        <div class="glass p-6 space-y-4">
            <h4 class="text-center text-xs tracking-widest text-purple-300 uppercase">Injection Terminal</h4>
            
            <input id="target-uid" type="number" placeholder="TARGET UID" class="input-field w-full">
            
            <select id="package-select" class="input-field w-full">
                <option value="7">1,000 LIKES - $7.00</option>
                <option value="12">3,000 LIKES - $12.00</option>
                <option value="27">5,000 LIKES - $27.00</option>
            </select>

            <button id="order-btn" onclick="executeOrder()" class="btn-primary w-full">EXECUTE ORDER</button>
            
            <div class="bg-black border border-gray-800 p-3 rounded-lg min-h-[60px]">
                <p id="status-msg" class="text-blue-400 text-[10px] font-mono">> STANDBY...</p>
                <p id="api-debug" class="text-gray-600 text-[8px] mt-1 break-all"></p>
            </div>

            <button onclick="logout()" class="w-full text-[10px] text-gray-600 border border-gray-800 p-2 rounded-lg hover:bg-red-900/20">[-] DISCONNECT SESSION</button>
        </div>
    </div>

    <script>
        // Konfigurasi Supabase
        const SUPABASE_URL = "https://ugszmvmawidtoqjidmor.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnc3ptdm1hd2lkdG9xamlkbW9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMjkyMTYsImV4cCI6MjA5MzgwNTIxNn0.2rRQ7DbKcN4Hp_zx-Jjj4XLLfDjYu2yy2U9ecLP_oJI";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        // --- SISTEM AUTH (LOGIN/REGISTER) ---
        async function handleAuth(type) {
            const user = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            const msg = document.getElementById('auth-msg');

            if(!user || !pass) return msg.innerText = "SILA ISI SEMUA RUANGAN!";

            try {
                if(type === 'register') {
                    // Semak jika user wujud
                    const { data: exist } = await _supabase.from('database panel').select('username').eq('username', user).single();
                    if(exist) return msg.innerText = "USERNAME SUDAH WUJUD!";

                    // Daftar User Baru (Baki permulaan $1000 contohnya)
                    await _supabase.from('database panel').insert([{ username: user, password: pass, balance: 1000 }]);
                    msg.style.color = "#22c55e";
                    msg.innerText = "PENDAFTARAN BERJAYA! SILA LOGIN.";
                } else {
                    // Login
                    const { data, error } = await _supabase.from('database panel').select('*').eq('username', user).eq('password', pass).single();
                    if(error || !data) throw new Error("USERNAME/PASSWORD SALAH!");

                    currentUser = data;
                    loadDashboard();
                }
            } catch (e) {
                msg.style.color = "#ef4444";
                msg.innerText = e.message;
            }
        }

        function loadDashboard() {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('display-name').innerText = currentUser.username.toUpperCase();
            document.getElementById('balance-amt').innerText = currentUser.balance.toFixed(2);
        }

        function logout() {
            location.reload();
        }

        // --- SISTEM TERMINAL (DARI KOD ASAL ANDA) ---
        async function executeOrder() {
            const uid = document.getElementById('target-uid').value;
            const price = parseFloat(document.getElementById('package-select').value);
            const status = document.getElementById('status-msg');
            const debug = document.getElementById('api-debug');
            const btn = document.getElementById('order-btn');

            if(!uid) return alert("Sila masukkan UID!");

            btn.disabled = true;
            status.innerText = "> INJECTING PAYLOAD...";
            
            try {
                // 1. Ambil baki terbaru dari Supabase
                const { data: userData } = await _supabase.from('database panel').select('balance').eq('username', currentUser.username).single();
                
                if(userData.balance < price) throw new Error("INSUFFICIENT_CREDITS");

                // 2. API Call (Gunakan Proxy untuk elak 'Load Failed')
                const targetUrl = `https://api.ffbd.store/xM/L?key=T526C4&uid=${uid}`;
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

                const response = await fetch(proxyUrl);
                const rawData = await response.text();
                debug.innerText = `RAW_RESPONSE: ${rawData}`;

                let apiData = JSON.parse(rawData);

                if(apiData.status == "1" || apiData.LikesGivenByAPI > 0) {
                    const newBal = userData.balance - price;
                    await _supabase.from('database panel').update({ balance: newBal }).eq('username', currentUser.username);
                    
                    document.getElementById('balance-amt').innerText = newBal.toFixed(2);
                    status.innerText = "> SUCCESS: DATA_ACCEPTED";
                    status.style.color = "#22c55e";
                } else {
                    status.innerText = `> REJECTED: ${apiData.message || 'API_OFFLINE'}`;
                    status.style.color = "#fbbf24";
                }
            } catch (e) {
                status.innerText = `> ERROR: ${e.message}`;
                status.style.color = "#ef4444";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
